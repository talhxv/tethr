services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - VITE_NOTION_TOKEN=${VITE_NOTION_TOKEN}
      - VITE_NOTION_DB_ID=${VITE_NOTION_DB_ID}
      - SITE_URL=${SITE_URL:-https://tethrhq.com}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
